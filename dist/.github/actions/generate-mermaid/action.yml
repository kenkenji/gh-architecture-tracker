name: "Generate Mermaid"
description: "アーキテクチャのMermaid図を生成し、データブランチへの配置とPRコメント投稿を行う"

inputs:
  github-token:
    description: "GitHub token for API access"
    required: true
  data-branch:
    description: "Branch name where architecture data is stored"
    required: true
    default: "_architecture-tracker"
  pr-number:
    description: "PR number for impact diagram"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Python dependencies
      shell: bash
      run: pip install pyyaml

    - name: Generate Mermaid diagrams
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        DATA_BRANCH: ${{ inputs.data-branch }}
        PR_NUMBER: ${{ inputs.pr-number }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        max_retries=3
        retry=0

        while [ $retry -lt $max_retries ]; do
          # データブランチをクローン
          work_dir=$(mktemp -d)
          git clone --branch "${DATA_BRANCH}" --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$work_dir"

          comment_file=$(mktemp --suffix=.md)
          pr_args=""
          if [ -n "$PR_NUMBER" ]; then
            pr_args="--pr-number ${PR_NUMBER} --output-comment ${comment_file}"
          fi

          # Mermaid図を生成
          python3 "${ACTION_PATH}/generate_mermaid.py" \
            --components-file "${work_dir}/components.yaml" \
            --mappings-file "${work_dir}/mappings.json" \
            --output-md "${work_dir}/architecture.md" \
            $pr_args

          # architecture.md をコミット & プッシュ
          cd "$work_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add architecture.md

          if git diff --cached --quiet; then
            echo "No changes to architecture.md"
          else
            git commit -m "Update architecture diagram for PR #${PR_NUMBER:-unknown}"

            if ! git push origin "${DATA_BRANCH}"; then
              echo "⚠️ Push failed (attempt $((retry + 1))/${max_retries}), retrying..."
              retry=$((retry + 1))
              rm -rf "$work_dir"
              rm -f "$comment_file"
              sleep $((retry * 2))
              continue
            fi
            echo "✅ Updated architecture.md on ${DATA_BRANCH}"
          fi

          cd - > /dev/null

          # PRコメントを投稿（既存コメントがあれば更新、なければ新規投稿）
          if [ -n "$PR_NUMBER" ] && [ -s "$comment_file" ]; then
            MARKER="## 📊 Architecture Impact"
            existing_comment_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
              | tail -1)

            if [ -n "$existing_comment_id" ]; then
              gh api "repos/${REPO}/issues/comments/${existing_comment_id}" \
                -X PATCH -F "body=@${comment_file}"
              echo "✅ Updated impact diagram comment on PR #${PR_NUMBER}"
            else
              gh pr comment "$PR_NUMBER" --body-file "$comment_file" --repo "$REPO"
              echo "✅ Posted impact diagram to PR #${PR_NUMBER}"
            fi
          fi

          rm -rf "$work_dir"
          rm -f "$comment_file"
          exit 0
        done

        echo "::error::Failed to push after ${max_retries} retries"
        exit 1
