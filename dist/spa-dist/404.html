<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
  <script>
    window.__AT_BASE_PATH__ = '/';
    sessionStorage.setItem('spa_redirect', JSON.stringify({
      pathname: location.pathname,
      search: location.search,
      hash: location.hash
    }));
    location.replace(location.origin + window.__AT_BASE_PATH__);
  </script>
</body>
</html>
